###################
### MY PROGRAMS ###
###################

$terminal = ghostty

#################
### AUTOSTART ###
#################

exec-once = waybar
exec-once = awww-daemon
exec-once = hyprshell run &
exec-once = protonvpn connect
exec-once = brave
exec-once = systemctl enable --now hyprpolkitagent
exec-once = hypridle
exec-once = obsidia

#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 5

    gaps_out = 7

    border_size = 1

    # https://wiki.hypr.land/Configuring/Variables/#variable-types for info about colors
    col.active_border = $source_color#rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(00000000)

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = false

    # Please see https://wiki.hypr.land/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = dwindle
}
decoration {
    rounding = 10
    rounding_power = 2

    active_opacity = 0.96
    inactive_opacity = 0.88

    shadow {
        enabled = false
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = false
        size = 3
        passes = 1
        vibrancy = 0.1696
    }
}

###################
### KEYBINDINGS ###
###################

$mainMod = SUPER

bind = $mainMod, X, exec, $terminal

bind = $mainMod SHIFT, R, exec, killall -SIGUSR2 waybar

bind = $mainMod SHIFT, S, exec, grimblast copy area

bind = ALT, TAB, exec, rofi -show window

#bind = ALT, TAB, cyclenext
#vind = ALT, TAB, bringactivetotop
#bind = ALT SHIFT, TAB, cyclenext, prev
#bind = ALT SHIFT, TAB, bringactivetotop

###################
### WINDOWRULES ###
###################

windowrule = opacity 0.88 0.84, match:class com.mitchellh.ghostty
